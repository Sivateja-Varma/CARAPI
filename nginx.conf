server {

    listen 80;

    location /  {
        proxy_pass http://frontend:80;
    }

    location /openapi.json {

        proxy_pass http://server:8000;

    }

        location /docs {

        proxy_pass http://server:8000;

    }

    location /redoc {

        proxy_pass http://server:8000;

    }


    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://server:8000;
    }
    location /uploads/ {

        proxy_pass http://server:8000/uploads/;

    }
}
